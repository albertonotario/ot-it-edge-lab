services:
  # --- Nivel 1-2 Purdue: el "PLC" ---
  modbus-plc:
    image: oitc/modbus-server:latest
    container_name: modbus-plc
    restart: unless-stopped
    command: -f /server_config.json
    ports:
      - "5020:5020"
    volumes:
      - ./modbus/server_config.json:/server_config.json:ro
    networks: [ot]

  # --- Nivel 3 Purdue: el Edge ---
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "1880:1880"
    volumes:
      - ./node-red:/data
    networks: [ot]
    depends_on: [modbus-plc, mosquitto]

  # --- Broker: frontera hacia IT ---
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks: [ot]

   # --- Recopilacion de datos con Telegraf e InfluxDB ---
  influxdb:
    image: influxdb:1.8-alpine
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks: [ot]

  telegraf: 
    image: telegraf:latest 
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro 
    networks: [ot]
    depends_on: [influxdb,mosquitto]

networks:
  ot:
    driver: bridge

volumes:
  influxdb_data:
